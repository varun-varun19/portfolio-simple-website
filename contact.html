<!DOCTYPE html>
<html>
  <head>
    <title>Contact Form</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Young+Serif&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
        <div class="section-one">
            <h1 class="section-one__name">Varun Karthick.S</h1>
            <p class="section-one__role">Mern-stack Developer</p>
            <a class="section-one__contact" href="index.html">Home</a>

        </div>
    
    <div class="contact-form">
    <form>
      <table>
        <tr>
          <td>
            <label for="name">Name:</label>
          </td>

          <td>
            <input class="contact-form__input" type="text" id="name" placeholder="Enter Your name" />
          </td>
        </tr>

        <tr>
          <td>
            <label for="email">Email:</label>
          </td>

          <td>
            <input class="contact-form__input" type="email" id="email" placeholder="Enter Your Email" />
          </td>
        </tr>

        <tr>
          <td>
            <label for="msg">Message:</label>
          </td>

          <td>
            <textarea class="contact-form__textarea" name="msg" id="msg" placeholder="Message...."></textarea>
          </td>
        </tr>

        <tr>
          <td></td>
          <td>
            <input class="contact-form__submit" type="submit" />
          </td>
        </tr>
      </table>
    </form>
    </div>

    <div class="section-five">
        <p class="section-five__title">
          Social Media:
          <a href="https://www.instagram.com/varun_varun19/">Instagram</a>,
          <a href="https://www.linkedin.com/in/varunkarthick-s/">Linkedin</a>
        </p>

        <p class="section-five__desc">&copy; Varun Karthick</p>
      </div>
  </body>
</html>
